<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Book shadow -->
  <rect x="18" y="8" width="170" height="268" rx="3" fill="#00000022"/>
  <!-- Book spine -->
  <rect x="10" y="4" width="20" height="268" rx="2" fill="url(#spine)"/>
  <!-- Book cover -->
  <rect x="20" y="4" width="168" height="268" rx="2" fill="url(#cover)"/>
  <!-- Decorative lines -->
  <rect x="30" y="20" width="148" height="2" fill="#ffffff33"/>
  <rect x="30" y="248" width="148" height="2" fill="#ffffff33"/>
  <!-- Book icon -->
  <g transform="translate(100,110)" fill="white" opacity="0.6">
    <rect x="-30" y="-35" width="28" height="44" rx="2"/>
    <rect x="2" y="-35" width="28" height="44" rx="2"/>
    <rect x="-30" y="-35" width="2" height="44" fill="#00000033"/>
  </g>
  <!-- "Bez slike" text -->
  <text x="104" y="175" font-family="Georgia, serif" font-size="13" fill="white" opacity="0.8" text-anchor="middle">bez slike</text>
</svg>
